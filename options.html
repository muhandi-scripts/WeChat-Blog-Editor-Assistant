<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>公众号HTML编辑器 - 配置管理</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    input, textarea { width: 100%; box-sizing: border-box; }
    .actions { margin-top: 20px; }
    button { margin-right: 8px; padding: 6px 12px; cursor: pointer; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>配置与替换规则</h1>
  <div>
    <label for="editorSelector">原始编辑器 CSS 选择器：</label>
    <input type="text" id="editorSelector" style="width: 100%;" placeholder="例如: div.rich_media_content div.ProseMirror[contenteditable='true']">
    <p style="font-size:12px; color:#666;">当页面布局变化导致扩展找不到编辑器时，请在此更新选择器。</p>
  </div>
  <div>
    <label for="targetSelector">浮动按钮定位目标 CSS 选择器：</label>
    <input type="text" id="targetSelector" style="width: 100%;" placeholder="例如: div#ai_layout_container > div">
    <p style="font-size:12px; color:#666;">按钮将相对于此元素的上方偏移显示。</p>
  </div>
  <h2>HTML 编辑模式</h2>
  <div style="display:flex;">
    <label><input type="radio" name="editMode" value="paragraph" checked>编辑当前段落</label>
    <label><input type="radio" name="editMode" value="full">编辑全部内容</label>
  </div>
  <h2>公式处理设置</h2>
  <div>
    <label>处理范围：</label>
    <select id="processScope">
      <option value="document">从文档开始</option>
      <option value="cursor">从光标位置</option>
    </select>
  </div>
  <div">
    <label>最多处理段落数（0表示不限制）：</label>
    <input type="number" id="maxFormulas" value="0" min="0" step="1">
  </div>
  <hr>
  <p>定义常用的正则替换规则，在编辑器的“🔍”下拉菜单中快速应用。</p>
  <div>
    <label>规则名称: <input type="text" id="ruleName" placeholder="例如: 清理空div"></label>
    <label>正则表达式: <input type="text" id="ruleRegex" placeholder="例如: <div[^>]*></div>"></label>
    <label>替换文本: <input type="text" id="ruleReplacement" placeholder="例如: "></label>
    <button id="addRule">添加规则</button>
  </div>
  <table id="rulesTable">
    <thead><tr><th>名称</th><th>正则</th><th>替换为</th><th>操作</th></tr></thead>
    <tbody></tbody>
  </table>
  <hr>
  <h2>模板库管理</h2>
  <p>定义 JSON 根键与对应 HTML 模板的映射。占位符使用 <code>{{key}}</code>，将从 JSON 对象中取值。</p>
  <div>
    <label>根键：<input type="text" id="templateKey" placeholder="例如 referenceArticle"></label>
    <label>模板 HTML：<textarea id="templateHtml" rows="4" cols="50" placeholder="<section>...</section>"></textarea></label>
    <button id="addTemplateBtn">添加/更新模板</button>
  </div>
  <table id="templateTable">
    <thead><tr><th>根键</th><th>模板预览</th><th>键集合</th><th>操作</th></tr></thead>
    <tbody></tbody>
  </table>
  <div class="actions">
    <button id="saveRules">保存所有修改</button>
    <span id="status"></span>
  </div>
  <hr>
  <h2>扩展日志</h2>
  <button id="clearLogs">清空日志</button>
  <button id="refreshLogs">刷新</button>
  <div id="logContainer" style="max-height:400px;overflow:auto;border:1px solid #ccc;padding:8px;background:#f9f9f9;">
    <pre id="logContent" style="margin:0;white-space:pre-wrap;font-size:12px;"></pre>
  </div>
  <script src="options.js"></script>
</body>
</html>
